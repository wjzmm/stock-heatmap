<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>A股全市场热度云图</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { background: #080c14; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; min-height: 100vh; padding: 10px 8px 16px; }

.header { text-align: center; margin-bottom: 10px; }
.header h1 { font-size: 20px; color: #ff5252; margin-bottom: 3px; font-weight: 700; }
.header .subtitle { color: #6b7a99; font-size: 11px; margin-bottom: 5px; }
.header .date-info { color: #ffd54f; font-size: 11px; background: rgba(255, 213, 79, 0.08); display: inline-block; padding: 3px 10px; border-radius: 10px; border: 1px solid rgba(255, 213, 79, 0.15); }

.tabs { display: flex; justify-content: center; gap: 6px; margin: 10px auto; max-width: 900px; }
.tab { flex: 1; max-width: 150px; padding: 7px 0; border-radius: 8px; background: rgba(255,255,255,0.04); color: #6b7a99; font-size: 12px; cursor: pointer; border: 1px solid rgba(255,255,255,0.06); text-align: center; transition: all 0.2s; font-weight: 500; }
.tab.active { background: linear-gradient(135deg, rgba(66, 133, 244, 0.15), rgba(66, 133, 244, 0.05)); color: #4285f4; border-color: rgba(66, 133, 244, 0.3); }

.view { display: none; max-width: 900px; margin: 0 auto; }
.view.active { display: block; }

/* 板块列表 */
.sector-list { display: flex; flex-direction: column; gap: 3px; }
@media (min-width: 480px) { .sector-list { display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px; } }

.sector-card {
  border-radius: 4px; padding: 5px 10px;
  display: flex; align-items: center; justify-content: space-between;
  min-height: 34px;
  transition: all 0.15s; position: relative;
}
/* 手机端根据热度调高度 */
.sector-card[data-span="1"] { min-height: 32px; }
.sector-card[data-span="2"] { min-height: 38px; }
.sector-card[data-span="3"] { min-height: 46px; }
.sector-card[data-span="4"] { min-height: 54px; }
.sector-card[data-span="5"] { min-height: 62px; }
.sector-card[data-span="6"] { min-height: 70px; }

@media (min-width: 480px) {
  .sector-card {
    flex-direction: column; justify-content: center; padding: 5px 4px; min-height: 44px !important;
    grid-column: span var(--span, 2);
  }
}
@media (min-width: 768px) { .sector-list { grid-template-columns: repeat(8, 1fr); gap: 5px; } }

.sector-card:active { transform: scale(0.98); }
.sector-card.has-stocks { cursor: pointer; }
.sector-card.has-stocks::after { content: ""; position: absolute; top: 3px; right: 3px; width: 5px; height: 5px; background: rgba(255,255,255,0.6); border-radius: 50%; }
.s-left { display: flex; align-items: center; gap: 8px; }
.s-name { font-size: 14px; font-weight: 700; white-space: nowrap; line-height: 1; }
.s-change { font-size: 16px; font-weight: 800; line-height: 1; }
.s-meta { font-size: 10px; opacity: 0.85; line-height: 1; }
.s-hint { font-size: 9px; opacity: 0.5; line-height: 1; margin-left: 4px; }

/* 全市场 */
.stock-list { display: flex; flex-direction: column; gap: 3px; }
@media (min-width: 480px) { .stock-list { display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px; } }
@media (min-width: 768px) { .stock-list { grid-template-columns: repeat(8, 1fr); gap: 5px; } }

.stock-card {
  border-radius: 4px; padding: 5px 10px;
  display: flex; align-items: center; justify-content: space-between;
  min-height: 34px;
}
.stock-card[data-span="1"] { min-height: 32px; }
.stock-card[data-span="2"] { min-height: 38px; }
.stock-card[data-span="3"] { min-height: 46px; }
.stock-card[data-span="4"] { min-height: 54px; }
.stock-card[data-span="5"] { min-height: 62px; }
.stock-card[data-span="6"] { min-height: 70px; }

@media (min-width: 480px) {
  .stock-card { flex-direction: column; justify-content: center; min-height: 44px !important; padding: 5px 4px; grid-column: span var(--span, 2); }
}
.st-left { display: flex; align-items: center; gap: 8px; }
.st-name { font-size: 14px; font-weight: 600; white-space: nowrap; line-height: 1; }
.st-change { font-size: 16px; font-weight: 700; line-height: 1; }
.st-meta { font-size: 10px; opacity: 0.85; line-height: 1; }

/* 详情 */
.detail-header {
  display: flex; align-items: center; justify-content: space-between;
  max-width: 900px; margin: 0 auto 10px; padding: 8px 10px;
  background: rgba(255,255,255,0.04); border-radius: 8px;
}
.detail-header h2 { font-size: 15px; color: #ff5252; font-weight: 700; }
.detail-header .meta { color: #6b7a99; font-size: 11px; }
.btn-back { background: rgba(255,82,82,0.12); border: 1px solid rgba(255,82,82,0.2); color: #ff5252; padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: 600; }
.show-more { text-align: center; margin: 10px 0; }
.show-more-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); color: #6b7a99; padding: 6px 20px; border-radius: 16px; cursor: pointer; font-size: 12px; }
.legend { display: flex; justify-content: center; gap: 5px; margin-top: 12px; flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 2px; font-size: 9px; color: #4a5568; }
.legend-box { width: 11px; height: 11px; border-radius: 2px; }
.footer { text-align: center; margin-top: 10px; color: #2d3748; font-size: 9px; }

.up-h { background: #c62828; color: #fff; }
.up-m { background: #e53935; color: #fff; }
.up-l { background: #ef5350; color: #fff; }
.up-xs { background: #ef9a9a; color: #fff; }
.flat { background: #757575; color: #fff; }
.down-xs { background: #a5d6a7; color: #1b5e20; }
.down-l { background: #66bb6a; color: #fff; }
.down-m { background: #388e3c; color: #fff; }
.down-h { background: #1b5e20; color: #fff; }
</style>
</head>

}
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  if (name === 'sector') { document.getElementById('sectorView').classList.add('active'); document.querySelectorAll('.tab')[0].classList.add('active'); }
  else { document.getElementById('marketView').classList.add('active'); document.querySelectorAll('.tab')[1].classList.add('active'); }
}
function initDate() {
  const now = new Date(), wd = ['周日','周一','周二','周三','周四','周五','周六'];
  const today = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
  let dd = new Date(now); if (now.getDay() === 0) dd.setDate(dd.getDate() - 2); else if (now.getDay() === 6) dd.setDate(dd.getDate() - 1);
  const dataDay = `${dd.getFullYear()}-${String(dd.getMonth()+1).padStart(2,'0')}-${String(dd.getDate()).padStart(2,'0')}`;
  const isH = (now.getDay() === 0 || now.getDay() === 6);
  document.getElementById('dataDate').textContent = `📅 ${dataDay} | 今日${today} ${wd[now.getDay()]}${isH?' 休市':''}`;
}
renderSectors(30);
renderMarket();
initDate();
window.addEventListener('resize', () => { renderSectors(30); renderMarket(); });
</script>
