<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A股全市场热度云图</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0e1a; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; min-height: 100vh; padding: 10px; }
.header { text-align: center; margin-bottom: 6px; }
.header h1 { font-size: 18px; color: #ff6b6b; margin-bottom: 2px; }
.header .subtitle { color: #8892b0; font-size: 10px; }
.header .date-info { color: #ffd93d; font-size: 11px; margin-top: 3px; background: rgba(255,217,61,0.1); display: inline-block; padding: 2px 8px; border-radius: 8px; }

.tabs { display: flex; justify-content: center; gap: 4px; margin: 8px auto; max-width: 900px; }
.tab { padding: 5px 14px; border-radius: 6px; background: rgba(255,255,255,0.05); color: #8892b0; font-size: 12px; cursor: pointer; border: 1px solid rgba(255,255,255,0.08); transition: all 0.2s; }
.tab.active { background: rgba(100,181,246,0.2); color: #64b5f6; border-color: rgba(100,181,246,0.4); }
.tab:hover:not(.active) { background: rgba(255,255,255,0.1); }

.view { display: none; max-width: 900px; margin: 0 auto; }
.view.active { display: block; }

.grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 2px; }
.block {
  border-radius: 3px; padding: 5px 3px;
  display: flex; flex-direction: column; justify-content: center; align-items: center;
  text-align: center; min-height: 42px; cursor: pointer;
  transition: transform 0.12s, filter 0.12s; position: relative;
}
.block:hover { transform: scale(1.03); z-index: 10; filter: brightness(1.12); }
.b-name { font-size: 10px; font-weight: 600; white-space: nowrap; text-shadow: 0 1px 2px rgba(0,0,0,0.6); }
.b-change { font-size: 9px; margin-top: 1px; font-weight: 500; }
.b-meta { font-size: 8px; opacity: 0.75; margin-top: 1px; }
.b-hint { font-size: 7px; opacity: 0.5; margin-top: 1px; }

.stock-header { display: flex; align-items: center; justify-content: space-between; max-width: 900px; margin: 0 auto 8px; padding: 6px 10px; background: rgba(255,255,255,0.03); border-radius: 6px; }
.stock-header h2 { font-size: 14px; color: #ff6b6b; }
.stock-header .meta { color: #8892b0; font-size: 10px; }
.btn-back { background: rgba(255,107,107,0.15); border: 1px solid rgba(255,107,107,0.3); color: #ff6b6b; padding: 2px 8px; border-radius: 3px; cursor: pointer; font-size: 10px; }
.btn-back:hover { background: rgba(255,107,107,0.3); }

.legend { display: flex; justify-content: center; gap: 5px; margin-top: 8px; flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 2px; font-size: 8px; color: #5a6680; }
.legend-box { width: 10px; height: 10px; border-radius: 2px; }
.footer { text-align: center; margin-top: 6px; color: #4a5568; font-size: 8px; }

.up-h { background: #b71c1c; color: #fff; }
.up-m { background: #d32f2f; color: #fff; }
.up-l { background: #f44336; color: #fff; }
.up-xs { background: #e57373; color: #fff; }
.flat { background: #616161; color: #fff; }
.down-xs { background: #81c784; color: #1b5e20; }
.down-l { background: #43a047; color: #fff; }
.down-m { background: #2e7d32; color: #fff; }
.down-h { background: #1b5e20; color: #fff; }
</style>
</head>
<body>
<div class="header">
  <h1>🔥 A股全市场热度云图</h1>
  <div class="subtitle">100个行业板块 + 全市场Top100 | 颜色=涨跌 大小=热度</div>
  <div class="date-info" id="dataDate">加载中...</div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('sector')">📊 板块视图(100)</div>
  <div class="tab" onclick="switchTab('market')">🌟 全市场Top100</div>
  <div class="tab" onclick="switchTab('concept')">💡 概念板块</div>
</div>

<div class="view active" id="sectorView">
  <div class="grid" id="sectorGrid"></div>
</div>

<div class="view" id="marketView">
  <div class="grid" id="marketGrid"></div>
</div>

<div class="view" id="conceptView">
  <div class="grid" id="conceptGrid"></div>
</div>

<div class="view" id="stockDetailView">
  <div class="stock-header">
    <div><h2 id="detailTitle">板块</h2><div class="meta" id="detailMeta"></div></div>
    <button class="btn-back" onclick="backToSector()">← 返回</button>
  </div>
  <div class="grid" id="detailGrid"></div>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-box up-h"></div>>7%</div>
  <div class="legend-item"><div class="legend-box up-m"></div>3-7%</div>
  <div class="legend-item"><div class="legend-box up-l"></div>1-3%</div>
  <div class="legend-item"><div class="legend-box up-xs"></div>0-1%</div>
  <div class="legend-item"><div class="legend-box flat"></div>0%</div>
  <div class="legend-item"><div class="legend-box down-xs"></div>0~-1%</div>
  <div class="legend-item"><div class="legend-box down-l"></div>-1~-3%</div>
  <div class="legend-item"><div class="legend-box down-m"></div>-3~-7%</div>
  <div class="legend-item"><div class="legend-box down-h"></div><-7%</div>
</div>
<div class="footer">
  <div id="marketStatus" style="color:#64b5f6;font-size:11px;margin-bottom:4px;">检测中...</div>
  <div id="countdown" style="color:#ffd93d;font-size:11px;margin-bottom:4px;"></div>
  <button onclick="location.reload()" style="background:rgba(100,181,246,0.15);border:1px solid rgba(100,181,246,0.3);color:#64b5f6;padding:3px 10px;border-radius:4px;cursor:pointer;font-size:10px;margin-bottom:4px;">🔄 立即刷新</button>
  <div>数据源: 东方财富 | 全量100个行业板块 + 全市场成交额Top100个股 | 红涨绿跌</div>
</div>

<script>

function cls(c) {
  if (c >= 7) return 'up-h'; if (c >= 3) return 'up-m'; if (c >= 1) return 'up-l';
  if (c > 0) return 'up-xs'; if (c === 0) return 'flat'; if (c > -1) return 'down-xs';
  if (c > -3) return 'down-l'; if (c > -5) return 'down-m'; return 'down-h';
}

function renderSectors() {
  const g = document.getElementById('sectorGrid');
  g.innerHTML = '';
  sectors.forEach((s, i) => {
    const d = document.createElement('div');
    d.className = 'block ' + cls(s.change);
    d.style.gridColumn = 'span ' + s.span;
    d.style.gridRow = 'span ' + (s.span >= 3 ? 2 : 1);
    if (s.stocks && s.stocks.length > 0) {
      d.onclick = () => showDetail(i);
      d.innerHTML = `<div class="b-name">${s.name}</div><div class="b-change">${s.change>0?'+':''}${s.change}%</div><div class="b-meta">成交${s.amount}亿</div><div class="b-hint">点击展开${s.stocks.length}只 →</div>`;
    } else {
      d.innerHTML = `<div class="b-name">${s.name}</div><div class="b-change">${s.change>0?'+':''}${s.change}%</div><div class="b-meta">成交${s.amount}亿</div>`;
    }
    g.appendChild(d);
  });
}

function renderMarket() {
  const g = document.getElementById('marketGrid');
  g.innerHTML = '';
  top100.forEach(st => {
    const d = document.createElement('div');
    d.className = 'block ' + cls(st.change);
    d.style.gridColumn = 'span ' + st.span;
    d.style.gridRow = 'span ' + (st.span >= 2 ? 2 : 1);
    const zj = st.zj ? `<div class="b-meta">💵${st.zj>0?'+':''}${st.zj}万</div>` : '';
    d.innerHTML = `<div class="b-name">${st.name}</div><div class="b-change">${st.change>0?'+':''}${st.change}%</div><div class="b-meta">成交${st.amount}亿</div>${zj}`;
    g.appendChild(d);
  });
}

function showDetail(idx) {
  const s = sectors[idx];
  document.getElementById('sectorView').classList.remove('active');
  document.getElementById('marketView').classList.remove('active');
  document.getElementById('stockDetailView').classList.add('active');
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('detailTitle').textContent = s.name + ' 成分股';
  const mainTxt = s.main > 0 ? `主力流入+¥${s.main}亿` : (s.main < 0 ? `主力流出¥${Math.abs(s.main)}亿` : '主力: 平');
  document.getElementById('detailMeta').textContent = `板块涨跌: ${s.change>0?'+':''}${s.change}% | ${mainTxt}`;
  const g = document.getElementById('detailGrid');
  g.innerHTML = '';
  s.stocks.forEach(st => {
    const d = document.createElement('div');
    d.className = 'block ' + cls(st.change);
    d.style.gridColumn = 'span 2';
    const zj = st.zj ? `<div class="b-meta">💵${st.zj>0?'+':''}${st.zj}万</div>` : '';
    d.innerHTML = `<div class="b-name">${st.name}</div><div class="b-change">${st.change>0?'+':''}${st.change}%</div>${zj}`;
    g.appendChild(d);
  });
}

function backToSector() {
  document.getElementById('stockDetailView').classList.remove('active');
  document.getElementById('conceptView').classList.remove('active');
  document.getElementById('sectorView').classList.add('active');
  document.querySelectorAll('.tab')[0].classList.add('active');
}

function renderConcepts() {
  const g = document.getElementById('conceptGrid');
  g.innerHTML = '';
  concepts.forEach(c => {
    const d = document.createElement('div');
    d.className = 'block ' + cls(c.change);
    d.style.gridColumn = 'span ' + c.span;
    d.style.gridRow = 'span ' + (c.span >= 3 ? 2 : 1);
    d.innerHTML = `<div class="b-name">${c.name}</div><div class="b-change">${c.change>0?'+':''}${c.change}%</div><div class="b-meta">成交${c.amount}亿</div>`;
    g.appendChild(d);
  });
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('stockDetailView').classList.remove('active');
  if (name === 'sector') {
    document.getElementById('sectorView').classList.add('active');
    document.querySelectorAll('.tab')[0].classList.add('active');
  } else if (name === 'market') {
    document.getElementById('marketView').classList.add('active');
    document.querySelectorAll('.tab')[1].classList.add('active');
  } else {
    document.getElementById('conceptView').classList.add('active');
    document.querySelectorAll('.tab')[2].classList.add('active');
  }
}

function initDate() {
  const now = new Date(), wd = ['周日','周一','周二','周三','周四','周五','周六'];
  const today = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
  let dd = new Date(now); if (now.getDay() === 0) dd.setDate(dd.getDate() - 2); else if (now.getDay() === 6) dd.setDate(dd.getDate() - 1);
  const dataDay = `${dd.getFullYear()}-${String(dd.getMonth()+1).padStart(2,'0')}-${String(dd.getDate()).padStart(2,'0')}`;
  const isH = (now.getDay() === 0 || now.getDay() === 6);
  document.getElementById('dataDate').textContent = `📅 数据日期: ${dataDay} | 今日${today} ${wd[now.getDay()]}${isH ? ' 休市' : ''}`;
}

let sectors = [];
let top100 = [];

fetch('data.json')
  .then(r => r.json())
  .then(d => {
    sectors = d.sectors || [];
    top100 = d.top100 || [];
    concepts = d.concepts || [];
    renderSectors();
    renderMarket();
    renderConcepts();
    initDate();
    updateStatus();
  })
  .catch(e => {
    document.getElementById('dataDate').textContent = '数据加载失败';
    console.error(e);
  });

// ===== 交易状态 & 自动刷新 =====
function getMarketStatus() {
  const now = new Date();
  const day = now.getDay();
  const h = now.getHours(), m = now.getMinutes();
  const time = h * 60 + m;
  // 周末
  if (day === 0 || day === 6) return { trading: false, status: 'holiday', label: '周末休市' };
  // 交易时段: 9:30-11:30 (570-690), 13:00-15:00 (780-900)
  if ((time >= 570 && time < 690) || (time >= 780 && time < 900))
    return { trading: true, status: 'open', label: '🔔 交易中' };
  return { trading: false, status: 'closed', label: '已收盘' };
}

let refreshTimer = null;
let countdownTimer = null;
let remaining = 60;

function updateStatus() {
  const st = getMarketStatus();
  document.getElementById('marketStatus').textContent = st.label;
  if (!st.trading) {
    document.getElementById('countdown').textContent = '';
    if (refreshTimer) { clearInterval(refreshTimer); refreshTimer = null; }
    if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; }
    return;
  }
  // 交易中: 启动倒计时
  if (!countdownTimer) {
    remaining = 60;
    document.getElementById('countdown').textContent = `自动刷新: ${remaining}s`;
    countdownTimer = setInterval(() => {
      remaining--;
      if (remaining <= 0) {
        remaining = 60;
        location.reload();
      }
      document.getElementById('countdown').textContent = `自动刷新: ${remaining}s`;
    }, 1000);
  }
}

// 每分钟检查一次交易状态（防止跨时段）
setInterval(updateStatus, 60000);
updateStatus();
</script>
</body>
</html>
