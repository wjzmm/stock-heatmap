document.addEventListener('DOMContentLoaded', function() {
  var chartDom = document.getElementById('chart');
  chartDom.style.height = Math.max(window.innerHeight - 100, 500) + 'px';
  var chart = echarts.init(chartDom);

const option = {
  tooltip: {
    formatter: function(info) {
      var d = info.data;
      var name = d.name || '未知';
      if (d.children) {
        return '<b>' + name + '</b><br/>总市值: ' + (d.value/1e8).toFixed(1) + '亿';
      }
      var change = (d.change > 0 ? '+' : '') + d.change + '%';
      return '<b>' + name + '</b><br/>涨跌幅: ' + change + '<br/>市值: ' + (d.value/1e8).toFixed(1) + '亿';
    },
    backgroundColor: 'rgba(10,14,26,0.95)',
    borderColor: '#333',
    textStyle: { color: '#fff' }
  },
  series: [{
    type: 'treemap',
    width: '100%',
    height: '100%',
    roam: false,
    nodeClick: false,
    breadcrumb: { show: false },
    label: {
      show: true,
      formatter: function(params) {
        var d = params.data;
        var change = d.change > 0 ? '+' + d.change.toFixed(1) + '%' : d.change.toFixed(1) + '%';
        if (params.rect.width < 45 || params.rect.height < 35) return '';
        if (params.rect.width < 75) return d.name;
        return d.name + '\n' + change;
      },
      fontSize: 10,
      color: '#fff'
    },
    upperLabel: {
      show: true,
      height: 18,
      color: '#ffd93d',
      fontSize: 11,
      fontWeight: 'bold'
    },
    itemStyle: {
      borderColor: '#0a0e1a',
      borderWidth: 1,
      gapWidth: 1
    },
    levels: [
      { itemStyle: { borderColor: '#0a0e1a', borderWidth: 2, gapWidth: 2 }, upperLabel: { show: true } },
      { itemStyle: { borderColor: '#1a1f2e', borderWidth: 1, gapWidth: 1 } }
    ],
    data: treemapData
  }]
};

chart.setOption(option);

// 交易状态 & 倒计时
function getMarketStatus() {
  const now = new Date();
  const day = now.getDay();
  const h = now.getHours(), m = now.getMinutes();
  const time = h * 60 + m;
  if (day === 0 || day === 6) return { trading: false, label: '周末休市' };
  if ((time >= 570 && time < 690) || (time >= 780 && time < 900))
    return { trading: true, label: '🔔 交易中' };
  return { trading: false, label: '已收盘' };
}

let countdownTimer = null;
let remaining = 60;

function updateStatus() {
  const st = getMarketStatus();
  document.getElementById('marketStatus').textContent = st.label;
  const now = new Date();
  const wd = ['周日','周一','周二','周三','周四','周五','周六'];
  document.getElementById('dataDate').textContent = `📅 数据日期: 2026-04-17 | 今日 ${now.getMonth()+1}月${now.getDate()}日 ${wd[now.getDay()]} ${st.trading ? '' : st.label}`;
  
  if (!st.trading) {
    document.getElementById('countdown').textContent = '';
    if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; }
    return;
  }
  if (!countdownTimer) {
    remaining = 60;
    document.getElementById('countdown').textContent = `自动刷新: ${remaining}s`;
    countdownTimer = setInterval(() => {
      remaining--;
      if (remaining <= 0) { remaining = 60; location.reload(); }
      document.getElementById('countdown').textContent = `自动刷新: ${remaining}s`;
    }, 1000);
  }
}

setInterval(updateStatus, 60000);
updateStatus();

window.addEventListener('resize', function() { chart.resize(); });
});
