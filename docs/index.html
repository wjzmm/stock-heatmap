function renderSectors() {
  const grid = document.getElementById('sectorGrid');
  grid.innerHTML = '';
  sectors.forEach((s, idx) => {
    const div = document.createElement('div');
    div.className = 'sector-block ' + s.cls;
    div.style.gridColumn = 'span ' + s.span;
    div.style.gridRow = 'span ' + (s.span >= 3 ? 2 : 1);
    div.onclick = () => showStocks(idx);
    const mainText = s.main > 0 ? `🔴+主力${s.main}亿` : (s.main < 0 ? `🔵主力${s.main}亿` : '');
    div.innerHTML = `<div class="sector-name">${s.name}</div><div class="sector-change">${s.change>0?'+':''}${s.change}%</div><div class="sector-meta">成交${s.amount}亿 ${mainText}</div><div class="sector-hint">点击查看${s.stocks.length}只 →</div>`;
    grid.appendChild(div);
  });
}

function showStocks(sectorIdx) {
  const s = sectors[sectorIdx];
  document.getElementById('sectorView').classList.remove('active');
  document.getElementById('stockView').classList.add('active');
  document.getElementById('stockTitle').textContent = s.name + ' 成分股';
  const mainText = s.main > 0 ? `主力流入+¥${s.main}亿` : (s.main < 0 ? `主力流出¥${Math.abs(s.main)}亿` : '主力流入: 平');
  document.getElementById('stockMeta').textContent = `板块涨跌: ${s.change>0?'+':''}${s.change}% | ${mainText} | 成交额¥${s.amount}亿`;
  const grid = document.getElementById('stockGrid');
  grid.innerHTML = '';
  const maxH = Math.max(...s.stocks.map(st=>st.heat));
  s.stocks.forEach(st => {
    const div = document.createElement('div');
    div.className = 'stock-block ' + st.cls;
    const span = Math.max(1, Math.round((st.heat / maxH) * 3));
    div.style.gridColumn = 'span ' + span;
    div.style.gridRow = 'span ' + (span >= 2 ? 2 : 1);
    const zjText = st.zj ? `<div class="stock-zj">💵${st.zj>0?'+':''}${st.zj}万</div>` : '';
    div.innerHTML = `<div class="stock-name">${st.name}</div><div class="stock-change">${st.change>0?'+':''}${st.change}%</div>${zjText}`;
    grid.appendChild(div);
  });
}

function showSectors() {
  document.getElementById('stockView').classList.remove('active');
  document.getElementById('sectorView').classList.add('active');
}

const REFRESH_INTERVAL = 60;
function getMarketStatus() {
  const now = new Date(), day = now.getDay(), h = now.getHours(), m = now.getMinutes(), time = h*60+m;
  if (day===0||day===6) return {trading:false,status:'holiday',label:'周末休市'};
  if ((time>=570&&time<690)||(time>=780&&time<900)) return {trading:true,status:'open',label:'交易中'};
  return {trading:false,status:'closed',label:'已收盘'};
}
function formatTimeLeft(s) { return s>60?`${Math.floor(s/60)}分${s%60}秒`:`${s}秒`; }
let countdown = REFRESH_INTERVAL, timer = null;
function updateUI() {
  const m = getMarketStatus();
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  const ms = document.getElementById('marketStatus');
  const cd = document.getElementById('countdown');
  ms.textContent = m.label; ms.className = 'market-status ' + m.status;
  if (m.trading) { dot.className='status-dot'; txt.textContent='自动刷新中'; cd.textContent=formatTimeLeft(countdown); }
  else { dot.className='status-dot '+(m.status==='holiday'?'off':'paused'); txt.textContent=m.status==='holiday'?'周末休市':'非交易时段'; cd.textContent='—'; }
}
function tick() {
  if (getMarketStatus().trading) { countdown--; if (countdown<=0) { forceRefresh(); return; } }
  updateUI();
}
function forceRefresh() { countdown=REFRESH_INTERVAL; const url=new URL(window.location.href); url.searchParams.set('t',Date.now()); window.location.href=url.toString(); }
function initDateInfo() {
  const now=new Date(), wd=['周日','周一','周二','周三','周四','周五','周六'];
  const today=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
  let dd=new Date(now); if(now.getDay()===0) dd.setDate(dd.getDate()-2); else if(now.getDay()===6) dd.setDate(dd.getDate()-1);
  const dataDay=`${dd.getFullYear()}-${String(dd.getMonth()+1).padStart(2,'0')}-${String(dd.getDate()).padStart(2,'0')}`;
  const isH=(now.getDay()===0||now.getDay()===6);
  document.getElementById('dataDate').textContent=`📅 数据日期：${dataDay} | 今日${today} ${wd[now.getDay()]}${isH?' 休市':''}`;
}

renderSectors();
initDateInfo();
updateUI();
timer = setInterval(tick, 1000);
document.addEventListener('visibilitychange', ()=>{ if(document.hidden) clearInterval(timer); else { timer=setInterval(tick,1000); updateUI(); } });
</script>
