<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大盘云图 - D3 Canvas</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; background:#252931; font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; }
#chart-container { width:100vw; height:100vh; position:relative; }
canvas { display:block; }
#tooltip {
  position:absolute; pointer-events:none; opacity:0; transition:opacity 0.15s;
  background:rgba(20,22,28,0.95); border:1px solid #3a3f4a; border-radius:6px;
  padding:10px 14px; font-size:12px; color:#e0e0e0; z-index:100;
  box-shadow:0 4px 16px rgba(0,0,0,0.4); min-width:160px;
}
#tooltip .tt-name { font-size:14px; font-weight:600; color:#fff; margin-bottom:4px; }
#tooltip .tt-row { display:flex; gap:12px; margin-top:4px; }
#tooltip .tt-up { color:#ff4d4f; }
#tooltip .tt-down { color:#00b578; }
#tooltip .tt-flat { color:#999; }
#loading {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  color:#8892a0; font-size:14px; z-index:50;
}
</style>
</head>
<body>
<div id="chart-container">
  <div id="loading">加载中...</div>
  <canvas id="chart"></canvas>
  <div id="tooltip">
    <div class="tt-name" id="tt-name"></div>
    <div class="tt-row">
      <span id="tt-change"></span>
      <span id="tt-cap"></span>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script>

// ========== Main App ==========
const API_URL = 'https://push2.eastmoney.com/api/qt/clist/get?fid=f20&po=1&pz=500&pn=1&np=1&fltt=2&invt=2&fields=f12,f14,f2,f3,f4,f5,f6,f7,f20,f21,f22,f23,f24,f25,f26,f27,f28,f29,f30,f33,f34,f35,f36,f37,f38,f39,f40,f41,f42,f43,f44,f45,f46,f47,f48,f49,f50,f51,f52,f53,f54,f55,f56,f57,f58,f59,f60,f61,f62,f63,f64,f65,f66,f67,f68,f69,f70,f71,f72,f73,f74,f75,f76,f77,f78,f79,f80,f81,f82,f83,f84,f85,f86,f87,f88,f89,f90,f91,f92,f93,f94,f95,f96,f97,f98,f99,f100&fs=m:0+t:6,m:0+t:80,m:1+t:2,m:1+t:23,m:0+t:81+s:2048';

const canvas = document.getElementById('chart');
const ctx = canvas.getContext('2d');
const tooltip = document.getElementById('tooltip');
const loading = document.getElementById('loading');

let nodes = [];
let dpr = window.devicePixelRatio || 1;
let canvasW, canvasH;

// 10档阶梯色（红涨绿跌）
const RED_STEPS = ['#4a0d0d','#6b1414','#8f1c1c','#b32424','#d63030','#e84646','#f06060','#f78a8a','#fcb3b3','#ffd9d9'];
const GREEN_STEPS = ['#0d3d0d','#145214','#1c6b1c','#248524','#2d9e2d','#36b736','#40d040','#5ce65c','#85ed85','#b3f5b3'];
const GRAY = '#3a3f4a';

function getColor(change) {
  if (change === undefined || change === null || change === '-') return GRAY;
  const c = parseFloat(change);
  if (isNaN(c)) return GRAY;
  const abs = Math.abs(c);
  const idx = Math.min(Math.floor(abs), 9);
  if (c > 0) return RED_STEPS[idx];
  if (c < 0) return GREEN_STEPS[idx];
  return GRAY;
}

function formatCap(v) {
  if (!v || v === '-') return '';
  const n = parseFloat(v);
  if (isNaN(n)) return '';
  if (n >= 1e12) return (n/1e12).toFixed(2) + '万亿';
  if (n >= 1e8) return (n/1e8).toFixed(2) + '亿';
  if (n >= 1e4) return (n/1e4).toFixed(2) + '万';
  return n.toFixed(0);
}

function resize() {
  const container = document.getElementById('chart-container');
  canvasW = container.clientWidth;
  canvasH = container.clientHeight;
  canvas.style.width = canvasW + 'px';
  canvas.style.height = canvasH + 'px';
  canvas.width = canvasW * dpr;
  canvas.height = canvasH * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  if (nodes.length) draw();
}

async function loadData() {
  try {
    const res = await fetch(API_URL);
    const json = await res.json();
    const items = json.data?.diff || [];
    const stocks = items.map(d => ({
      code: d.f12,
      name: d.f14,
      price: d.f2,
      change: d.f3,
      changeAmt: d.f4,
      volume: d.f5,
      amount: d.f6,
      marketCap: d.f20,
      industry: d.f52 || d.f53 || ''
    })).filter(s => s.name && s.marketCap && parseFloat(s.marketCap) > 0);

    // 按行业分组（如果有行业信息，否则按涨跌幅分组）
    const groups = {};
    stocks.forEach(s => {
      let g = s.industry;
      if (!g) {
        const c = parseFloat(s.change) || 0;
        if (c > 5) g = '大涨';
        else if (c > 2) g = '中涨';
        else if (c > 0) g = '小涨';
        else if (c === 0) g = '平盘';
        else if (c > -2) g = '小跌';
        else if (c > -5) g = '中跌';
        else g = '大跌';
      }
      if (!groups[g]) groups[g] = [];
      groups[g].push(s);
    });

    // 构建 D3 树
    const rootData = {
      name: '大盘',
      children: Object.entries(groups).map(([name, children]) => ({
        name,
        children: children.map(c => ({ ...c, value: parseFloat(c.marketCap) || 1 }))
      }))
    };

    const root = d3.hierarchy(rootData)
      .sum(d => d.value)
      .sort((a, b) => b.value - a.value);

    d3.treemap()
      .size([canvasW, canvasH])
      .paddingOuter(0)
      .paddingTop(0)
      .paddingRight(0)
      .paddingBottom(0)
      .paddingLeft(0)
      .paddingInner(0)
      .round(false)
      .tile(d3.treemapSquarify)
      (root);

    // 收集叶子节点
    nodes = [];
    root.leaves().forEach(d => {
      nodes.push({
        x: d.x0, y: d.y0,
        w: d.x1 - d.x0, h: d.y1 - d.y0,
        data: d.data
      });
    });

    loading.style.display = 'none';
    draw();
  } catch (e) {
    loading.textContent = '加载失败: ' + e.message;
    console.error(e);
  }
}

function draw() {
  ctx.clearRect(0, 0, canvasW, canvasH);
  ctx.fillStyle = '#252931';
  ctx.fillRect(0, 0, canvasW, canvasH);

  nodes.forEach(n => {
    const d = n.data;
    const change = parseFloat(d.change) || 0;
    const color = getColor(change);

    // 填充矩形
    ctx.fillStyle = color;
    ctx.fillRect(n.x, n.y, n.w, n.h);

    // 边框（超小间隙效果）
    ctx.strokeStyle = '#252931';
    ctx.lineWidth = 0.5;
    ctx.strokeRect(n.x, n.y, n.w, n.h);

    // 文字
    const minSize = Math.min(n.w, n.h);
    if (minSize < 20) return; // 太小不显示

    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const cx = n.x + n.w / 2;
    const cy = n.y + n.h / 2;

    // 行业/名称
    let fontSize = Math.min(minSize * 0.25, 14);
    ctx.font = `600 ${fontSize}px -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif`;
    ctx.fillStyle = '#fff';
    const name = d.name;
    const nameW = ctx.measureText(name).width;
    if (nameW <= n.w - 4) {
      ctx.fillText(name, cx, cy - fontSize * 0.6);
    }

    // 涨跌幅
    if (minSize > 35) {
      const changeStr = (change > 0 ? '+' : '') + change.toFixed(2) + '%';
      fontSize = Math.min(minSize * 0.18, 11);
      ctx.font = `${fontSize}px -apple-system, "PingFang SC", sans-serif`;
      ctx.fillStyle = change > 0 ? '#fff' : (change < 0 ? '#fff' : '#ccc');
      ctx.fillText(changeStr, cx, cy + fontSize * 0.8);
    }

    // 市值
    if (minSize > 50) {
      const capStr = formatCap(d.marketCap);
      fontSize = Math.min(minSize * 0.14, 9);
      ctx.font = `${fontSize}px -apple-system, sans-serif`;
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      ctx.fillText(capStr, cx, cy + fontSize * 2.2);
    }
  });
}

// 交互
let hovered = null;
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  let found = null;
  for (const n of nodes) {
    if (x >= n.x && x <= n.x + n.w && y >= n.y && y <= n.y + n.h) {
      found = n;
      break;
    }
  }

  if (found !== hovered) {
    hovered = found;
    if (found) {
      const d = found.data;
      const change = parseFloat(d.change) || 0;
      document.getElementById('tt-name').textContent = d.name + ' (' + d.code + ')';
      const changeEl = document.getElementById('tt-change');
      changeEl.textContent = (change > 0 ? '+' : '') + change.toFixed(2) + '%';
      changeEl.className = change > 0 ? 'tt-up' : (change < 0 ? 'tt-down' : 'tt-flat');
      document.getElementById('tt-cap').textContent = '市值: ' + formatCap(d.marketCap);
      tooltip.style.opacity = '1';
    } else {
      tooltip.style.opacity = '0';
    }
  }

  if (found) {
    tooltip.style.left = (e.clientX + 12) + 'px';
    tooltip.style.top = (e.clientY + 12) + 'px';
  }
});

canvas.addEventListener('mouseleave', () => {
  hovered = null;
  tooltip.style.opacity = '0';
});

window.addEventListener('resize', () => {
  resize();
  loadData();
});

// 初始化
resize();
loadData();
setInterval(loadData, 60000);
</script>
</body>
</html>
