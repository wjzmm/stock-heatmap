<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>A股大盘云图</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#1a1d29;color:#e0e0e0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",PingFang SC,Microsoft YaHei,sans-serif;overflow:hidden;touch-action:none}
#header{height:44px;display:flex;align-items:center;justify-content:space-between;padding:0 12px;background:#252a38;border-bottom:1px solid rgba(255,255,255,0.06)}
#header h1{font-size:16px;font-weight:700;color:#ff6b6b;letter-spacing:1px}
#header .info{font-size:11px;color:#8b92a8}
#canvas-wrap{position:relative;width:100vw;height:calc(100vh - 44px)}
canvas{display:block;width:100%;height:100%}
#tooltip{position:absolute;display:none;background:rgba(30,35,50,0.95);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:10px 14px;font-size:12px;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,0.5);z-index:100;max-width:200px;line-height:1.6}
#tooltip .name{font-size:14px;font-weight:700;color:#fff;margin-bottom:4px}
#tooltip .row{display:flex;justify-content:space-between;gap:12px;color:#aab2c8}
#tooltip .up{color:#ff5252}
#tooltip .down{color:#00d641}
#legend{position:absolute;right:8px;top:8px;background:rgba(30,35,50,0.85);border-radius:6px;padding:6px 8px;font-size:10px;color:#8b92a8;pointer-events:none}
#legend .bar{width:80px;height:8px;border-radius:4px;margin-top:4px;background:linear-gradient(to right,#00d641,#1a1a2e,#ff5252)}
#loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#1a1d29;z-index:200;font-size:14px;color:#8b92a8}
</style>
</head>
<body>
<div id="header"><h1>🔥 A股大盘云图</h1><span class="info" id="status">加载中...</span></div>
<div id="canvas-wrap">
  <div id="loading">正在加载数据...</div>
  <canvas id="chart"></canvas>
  <div id="legend">涨跌幅<div class="bar"></div>-5% &nbsp; 0% &nbsp; +5%</div>
  <div id="tooltip">
    <div class="name" id="tt-name"></div>
    <div class="row"><span>涨跌幅</span><span id="tt-change"></span></div>
    <div class="row"><span>市值</span><span id="tt-cap"></span></div>
  </div>
</div>

<script>

<script>
(function(){
  'use strict';
  const canvas = document.getElementById('chart');
  const ctx = canvas.getContext('2d');
  const wrap = document.getElementById('canvas-wrap');
  const tooltip = document.getElementById('tooltip');
  const loading = document.getElementById('loading');
  const status = document.getElementById('status');
  let rootData = null, leaves = [], dpr = 1;

  function formatCap(v){
    if(v >= 10000) return (v/10000).toFixed(2) + '万亿';
    return v.toFixed(0) + '亿';
  }

  function colorForChange(c){
    if(c === undefined || c === null) return '#424453';
    if(c > 0){
      const t = Math.min(c / 5, 1);
      const r = 255, g = Math.round(80 + 60 * (1 - t)), b = Math.round(80 + 60 * (1 - t));
      return `rgb(${r},${g},${b})`;
    } else if(c < 0){
      const t = Math.min(Math.abs(c) / 5, 1);
      const r = Math.round(60 + 80 * (1 - t)), g = 255, b = Math.round(80 + 60 * (1 - t));
      return `rgb(${r},${g},${b})`;
    }
    return '#424453';
  }

  function resize(){
    const w = wrap.clientWidth, h = wrap.clientHeight;
    dpr = window.devicePixelRatio || 1;
    canvas.width = w * dpr; canvas.height = h * dpr;
    canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    if(rootData) draw(rootData, w, h);
  }

  function draw(data, W, H){
    ctx.clearRect(0, 0, W, H);
    const root = d3.hierarchy(data).sum(d => d.scale || 0).sort((a,b) => (b.value || 0) - (a.value || 0));
    d3.treemap().size([W, H]).paddingOuter(2).paddingTop(18).paddingInner(1).round(true)(root);
    leaves = root.leaves();

    // 绘制行业背景和标题
    const sectors = [];
    leaves.forEach(d => {
      const p = d.parent;
      if(!p || p.depth !== 1) return;
      const key = p.data.id || p.data.name;
      if(!sectors.find(s => s.key === key)){
        sectors.push({key, name: p.data.name, x0: p.x0, y0: p.y0, x1: p.x1, y1: p.y1, change: p.data.condition});
      }
    });

    // 行业背景
    sectors.forEach(s => {
      ctx.fillStyle = '#2a2f40';
      ctx.fillRect(s.x0, s.y0, s.x1 - s.x0, s.y1 - s.y0);
      ctx.strokeStyle = 'rgba(255,255,255,0.06)';
      ctx.strokeRect(s.x0, s.y0, s.x1 - s.x0, s.y1 - s.y0);
    });

    // 绘制个股
    leaves.forEach(d => {
      const x = d.x0, y = d.y0, w = d.x1 - d.x0, h = d.y1 - d.y0;
      if(w < 1 || h < 1) return;
      const c = d.data.condition;
      ctx.fillStyle = colorForChange(c);
      ctx.fillRect(x, y, w, h);
      ctx.strokeStyle = 'rgba(0,0,0,0.2)';
      ctx.lineWidth = 0.5;
      ctx.strokeRect(x, y, w, h);

      // 文字
      if(w > 30 && h > 18){
        ctx.fillStyle = '#fff';
        ctx.font = `bold ${Math.min(11, Math.floor(w/3.5))}px sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        const text = d.data.name;
        const maxLen = Math.floor(w / 11);
        const display = text.length > maxLen && maxLen > 1 ? text.slice(0, maxLen - 1) + '…' : text;
        ctx.fillText(display, x + w/2, y + h/2 - 1);

        if(w > 40 && h > 26){
          ctx.font = `${Math.min(10, Math.floor(w/4))}px sans-serif`;
          ctx.fillStyle = 'rgba(255,255,255,0.85)';
          const pct = c > 0 ? '+' + c + '%' : c + '%';
          ctx.fillText(pct, x + w/2, y + h/2 + 11);
        }
      }
    });

    // 行业标题
    sectors.forEach(s => {
      const w = s.x1 - s.x0;
      if(w < 20) return;
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      ctx.font = 'bold 11px sans-serif';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      const txt = s.name + (s.change !== undefined ? ' ' + (s.change > 0 ? '+' : '') + s.change + '%' : '');
      ctx.fillText(txt, s.x0 + 4, s.y0 + 3);
    });

    status.textContent = '数据日期: ' + new Date().toLocaleDateString('zh-CN') + ' | 共' + leaves.length + '只股票';
  }

  function hitTest(x, y){
    if(!leaves.length) return null;
    // 从大到小找，先找子节点
    for(let i=leaves.length-1;i>=0;i--){
      const d = leaves[i];
      if(x >= d.x0 && x <= d.x1 && y >= d.y0 && y <= d.y1) return d;
    }
    return null;
  }

  function showTooltip(d, px, py){
    const name = document.getElementById('tt-name');
    const change = document.getElementById('tt-change');
    const cap = document.getElementById('tt-cap');
    name.textContent = d.data.name;
    const c = d.data.condition;
    change.textContent = (c > 0 ? '+' : '') + c + '%';
    change.className = c >= 0 ? 'up' : 'down';
    cap.textContent = formatCap(d.data.scale || 0);
    tooltip.style.display = 'block';
    const tw = tooltip.offsetWidth, th = tooltip.offsetHeight;
    let left = px + 12, top = py + 12;
    if(left + tw > wrap.clientWidth) left = px - tw - 8;
    if(top + th > wrap.clientHeight) top = py - th - 8;
    tooltip.style.left = left + 'px';
    tooltip.style.top = top + 'px';
  }

  function hideTooltip(){ tooltip.style.display = 'none'; }

  function handleMove(ex, ey){
    const rect = canvas.getBoundingClientRect();
    const x = ex - rect.left, y = ey - rect.top;
    const d = hitTest(x, y);
    if(d){ showTooltip(d, x, y); canvas.style.cursor = 'pointer'; }
    else { hideTooltip(); canvas.style.cursor = 'default'; }
  }

  canvas.addEventListener('mousemove', e => handleMove(e.clientX, e.clientY));
  canvas.addEventListener('touchstart', e => {
    if(e.touches.length === 1){
      const t = e.touches[0];
      handleMove(t.clientX, t.clientY);
    }
  }, {passive:true});
  canvas.addEventListener('touchmove', e => {
    if(e.touches.length === 1){
      const t = e.touches[0];
      handleMove(t.clientX, t.clientY);
    }
  }, {passive:true});
  canvas.addEventListener('touchend', hideTooltip);
  canvas.addEventListener('mouseleave', hideTooltip);

  window.addEventListener('resize', () => { resize(); });

  // 加载数据
  fetch('treemap_data.json?v=' + Date.now())
    .then(r => r.json())
    .then(data => {
      rootData = data;
      loading.style.display = 'none';
      resize();
    })
    .catch(err => {
      loading.textContent = '数据加载失败: ' + err.message;
      console.error(err);
    });
})();
</script>
</body>
</html>
